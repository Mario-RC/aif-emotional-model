### model
model_name_or_path: THUDM/glm-4-9b-chat-1m
adapter_name_or_path: saves/glm-4-9b-chat-1m/lora/sft

### method
stage: sft
do_predict: true
finetuning_type: lora

### dataset
dataset: rm_prompt_dataset_1
# eval_dataset: prompt_dataset_handmade
template: glm4
cutoff_len: 1024
max_samples: 10000
overwrite_cache: true
preprocessing_num_workers: 16

### output
output_dir: saves/glm-4-9b-chat-1m/lora/train/predict_4_1
overwrite_output_dir: true

### train
temperature: 1.1
top_k: 120
top_p: 0.5

### eval
per_device_eval_batch_size: 1
predict_with_generate: true
ddp_timeout: 180000000
