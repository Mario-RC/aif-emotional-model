### model
model_name_or_path: google/gemma-2-9b-it
adapter_name_or_path: saves/gemma-2-9b-it/lora/sft

### method
stage: sft
do_predict: true
finetuning_type: lora

### dataset
dataset: sft_demonstration_dataset_test
