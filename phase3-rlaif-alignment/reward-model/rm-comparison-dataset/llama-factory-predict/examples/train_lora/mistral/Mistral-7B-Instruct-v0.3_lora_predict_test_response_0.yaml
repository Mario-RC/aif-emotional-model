### model
model_name_or_path: mistralai/Mistral-7B-Instruct-v0.3
adapter_name_or_path: saves/Mistral-7B-Instruct-v0.3/lora/sft

### method
stage: sft
do_predict: true
finetuning_type: lora

### dataset
dataset: rm_prompt_dataset_test
