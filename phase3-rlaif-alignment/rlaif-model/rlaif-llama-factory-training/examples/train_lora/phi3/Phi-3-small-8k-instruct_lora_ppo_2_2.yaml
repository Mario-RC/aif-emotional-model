### model
model_name_or_path: microsoft/Phi-3-small-8k-instruct
adapter_name_or_path: saves/Phi-3-small-8k-instruct/lora/sft_d_3
reward_model: saves/Phi-3-small-8k-instruct/lora/rm_1
trust_remote_code: true

### method
stage: ppo
do_train: true
finetuning_type: lora
lora_target: all

### dataset
dataset: ppo_unlabeled_prompts_dataset
template: phi
cutoff_len: 2048
max_samples: 1000000
overwrite_cache: true
preprocessing_num_workers: 16

### output
output_dir: saves/Phi-3-small-8k-instruct/lora/ppo_2_2
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 1.0e-5
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

### generate
max_new_tokens: 512
top_k: 0
top_p: 0.9
