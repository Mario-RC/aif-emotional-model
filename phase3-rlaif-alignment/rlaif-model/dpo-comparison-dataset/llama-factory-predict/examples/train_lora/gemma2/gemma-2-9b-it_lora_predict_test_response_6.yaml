### model
model_name_or_path: google/gemma-2-9b-it
adapter_name_or_path: saves/gemma-2-9b-it/lora/sft

### method
stage: sft
do_predict: true
finetuning_type: lora

### dataset
eval_dataset: ppo_unlabeled_prompts_dataset_1k_test
template: gemma
cutoff_len: 1024
max_samples: 10000
overwrite_cache: true
preprocessing_num_workers: 16

### output
output_dir: saves/gemma-2-9b-it/lora/test/predict_6
overwrite_output_dir: true

### train
temperature: 1.7
top_k: 50
top_p: 0.7

### eval
per_device_eval_batch_size: 1
predict_with_generate: true
ddp_timeout: 180000000
