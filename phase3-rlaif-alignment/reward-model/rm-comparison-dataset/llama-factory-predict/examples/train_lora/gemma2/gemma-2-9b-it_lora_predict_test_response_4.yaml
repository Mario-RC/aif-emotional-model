### model
model_name_or_path: google/gemma-2-9b-it
adapter_name_or_path: ../../../../phase2-sft-alignment/sft-model/sft-llama-factory-training/saves/gemma-2-9b-it/lora/sft_3ep

### method
stage: sft
do_predict: true
finetuning_type: lora

### dataset
dataset: rm_prompt_dataset_test
# eval_dataset: prompt_dataset_handmade
template: gemma
cutoff_len: 1024
max_samples: 10000
overwrite_cache: true
preprocessing_num_workers: 16

### output
output_dir: saves/gemma-2-9b-it/predict/test/predict_4
overwrite_output_dir: true

### train
temperature: 1.1
top_k: 120
top_p: 0.5

### eval
per_device_eval_batch_size: 1
predict_with_generate: true
ddp_timeout: 180000000
