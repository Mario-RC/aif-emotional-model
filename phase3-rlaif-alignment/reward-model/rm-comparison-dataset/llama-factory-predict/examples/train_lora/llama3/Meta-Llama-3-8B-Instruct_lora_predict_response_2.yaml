### model
model_name_or_path: meta-llama/Meta-Llama-3-8B-Instruct
adapter_name_or_path: ../../../../phase2-sft-alignment/sft-model/sft-llama-factory-training/saves/Meta-Llama-3-8B-Instruct/lora/sft_3ep

### method
stage: sft
do_predict: true
finetuning_type: lora

### dataset
dataset: rm_prompt_dataset
# eval_dataset: prompt_dataset_handmade
template: llama3
cutoff_len: 1024
max_samples: 10000
overwrite_cache: true
preprocessing_num_workers: 16

### output
output_dir: saves/Meta-Llama-3-8B-Instruct/predict/train/predict_2
overwrite_output_dir: true

### train
temperature: 0.6
top_k: 150
top_p: 1.0

### eval
per_device_eval_batch_size: 1
predict_with_generate: true
ddp_timeout: 180000000
